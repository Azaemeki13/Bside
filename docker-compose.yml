name: bside
services:
  db:
    image: postgres:15-alpine
    container_name: bside_db_dev
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  adminer:
    image: adminer
    container_name: bside_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db
  minio:
    image: minio/minio
    container_name: bside_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
  minio-setup:
    image: minio/minio
    depends_on:
      - minio
    volumes:
      - ./scripts/setup-minio.sh:/setup-minio.sh:Z
      - ./scripts/setup-cors.xml:/setup-cors.xml:Z
      - ./scripts/defaults:/defaults:Z
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    entrypoint: /bin/sh /setup-minio.sh
  ml_service:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile
    container_name: bside_ml_service
    restart: always
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MINI_IO_ENDPOINT=http://minio:9000
      - PUBLIC_API_KEY=${PUBLIC_API_KEY}
    depends_on:
      - minio
    volumes:
      - ./ml_engine:/app:Z
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: bside_rust_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@bside_db_dev:5432/${DB_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_PUBLIC_ENDPOINT_URL=http://localhost:9000
      - OAUTH_ID=${OAUTH_ID}
      - OAUTH_PW=${OAUTH_PW}
      - G_AUTH_URL=${G_AUTH_URL}
      - G_TOKEN_URL=${G_TOKEN_URL}
      - OAUTH_URL=${OAUTH_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PUBLIC_API_KEY=${PUBLIC_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}

    depends_on:
      - db
      - minio
volumes:
  minio_data:
  postgres_data:
