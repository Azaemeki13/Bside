<div class="relative flex h-screen bg-[#0C060C]">
  <app-side-bar></app-side-bar>
  <div class="flex flex-col flex-1 min-w-0">
    <app-nav-bar></app-nav-bar>
    <main class="flex-1 overflow-auto min-h-0 pr-6">
      <router-outlet></router-outlet>
    </main>
    <app-sound-bar></app-sound-bar>
  </div>
    @if (authService.isTryMePopupOpen()) {
      <div class="absolute inset-0 z-[9999] backdrop-blur-sm bg-[#FFE6DB]/10 flex items-center justify-center pointer-events-auto"
          (click)="authService.isTryMePopupOpen.set(false)">
        <div class="pointer-events-auto flex items-center gap-6 px-8 py-7 text-[#FFE6DB] bg-[#0C060C] rounded-xl"
            (click)="$event.stopPropagation()">
          
          <div class="flex flex-col items-center gap-2 text-center">
            <h1 class="font-climate-crisis text-[3rem] leading-none">B-SIDE</h1>
            <h2 class="font-raleway text-[1.2rem] font-black text-[#FFE6DB] max-w-sm mt-2">
              Join the B-SIDE community and enjoy unlimited audio streaming.
            </h2>
            <p class="font-raleway text-sm text-[#FFE6DB]/70 max-w-sm">
              Create an account to access all features and enjoy a personalized music experience.
            </p>
            
            <div class="flex gap-3 pt-4">
              <button (click)="authService.isTryMePopupOpen.set(false)"
                      class="cursor-pointer rounded-full px-5 py-2 font-raleway text-[1rem] font-medium border border-[#FFE6DB]/30 text-[#FFE6DB]">
                Continue
              </button>
              <a routerLink="/signup" (click)="authService.isTryMePopupOpen.set(false)"
                class="cursor-pointer rounded-full px-5 py-2 font-raleway text-[1rem] font-medium bg-[#FF5500] text-[#FFE6DB]">
                Create an account
              </a>
            </div>
          </div>
        </div>
      </div>
    }
</div>
