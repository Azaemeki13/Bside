<div class="flex h-full w-full gap-4 overflow-hidden">
  <div class="h-full w-[22rem] shrink-0 overflow-hidden rounded-[1.563rem]">
  <app-social-side-bar
      [users]="users"
      [conversations]="conversations"
      [currentUserId]="currentUser()?.id ?? null"
      [selectedConversationId]="selectedConversation?.other_user_id ?? null"
      [isLoadingUsers]="isLoadingUsers"
      [isLoadingConversations]="isLoadingConversations"
      [friendIds]="friendIds"
      [friends]="friends"
      [friendRequests]="friendRequests"
      [friendActionUserId]="friendActionUserId"
      [friendActionRequestId]="friendActionRequestId"
      (conversationSelected)="selectConversation($event)"
      (userSelected)="startConversationWithUser($event)"
      (friendRequested)="sendFriendRequest($event)"
      (friendAccepted)="acceptFriendRequest($event)"
      (friendRejected)="rejectFriendRequest($event)"
    ></app-social-side-bar>
  </div>

  <div class="min-w-0 flex-1 overflow-hidden rounded-[1.563rem]">
  <app-social-chat
        [selectedConversation]="selectedConversation"
        [messages]="messages"
        [currentUserId]="currentUser()?.id ?? null"
        [isLoadingMessages]="isLoadingMessages"
        [isOtherUserOnline]="isSelectedConversationUserOnline"
        (messageSent)="sendMessage($event)"
      ></app-social-chat>
  </div>

  <div class="h-full w-[17.5rem] shrink-0 overflow-y-auto rounded-[1.563rem]">
    <div class="flex flex-col gap-3 pr-1">

      @if (isLoadingSongCards && receivedSongCards.length === 0) {
        <p class="font-raleway text-xs text-[#FFE6DB]/50">Loading cards...</p>
      } @else if (receivedSongCards.length === 0) {
        <p class="font-raleway text-xs text-[#FFE6DB]/50">
          Songs your friends share with you will show up here.
        </p>
      } @else {
        @for (card of receivedSongCards; track trackSongCardById($index, card)) {
          <button
            type="button"
            class="cursor-pointer text-left"
            (click)="openSongCard(card)"
          >
            <app-social-share-card [song]="card.message.shared_song!"></app-social-share-card>
          </button>
        }
      }
    </div>
  </div>
</div>
