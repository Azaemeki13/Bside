<div class="flex flex-row gap-4 h-full overflow-hidden">
  <app-settings-side-bar
    (openArtistForm)="showArtistForm = true; showProfile = false"
    (openProfile)="showProfile = true; showArtistForm = false"
    class="min-h-0 overflow-hidden">
  </app-settings-side-bar>

  @if (showProfile) {
    <app-profile (close)="showProfile = false" class="flex-1 min-w-0"/>
  }
  @if (showArtistForm) {
    <app-artist-form (close)="showArtistForm = false" class="flex-1 min-w-0"/>
  }
</div>
