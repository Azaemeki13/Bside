<div class="flex flex-row gap-4 h-full overflow-hidden">
  <app-settings-side-bar
    (openArtistForm)="showArtistForm = !showArtistForm; showProfile = false"
    (openProfile)="showProfile = !showProfile; showArtistForm = false"
    class="min-h-0 overflow-y-auto">
  </app-settings-side-bar>

  @if (showProfile) {
<app-profile (close)="showProfile = false" class="flex-1 overflow-y-auto min-w-0"/>
  }
  @if (showArtistForm) {
    <app-artist-form (close)="showArtistForm = false" class="flex-1 overflow-y-auto min-w-0"/>
  }
</div>
