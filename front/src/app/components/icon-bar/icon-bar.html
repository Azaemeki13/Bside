<div class="min-w-0 flex-none w-32">
    <div class="w-full h-[4rem] rounded-full border border-[#FFE6DB]/15 bg-[#FFE6DB]/10 px-3 py-2 backdrop-blur-sm glass-card">
        <div class="flex items-center justify-center gap-2 h-full">
            <button
                type="button"
                aria-label="Like"
                [attr.aria-pressed]="audio.currentTrack() ? playlistService.isLiked(audio.currentTrack()!.id) : false"
                [disabled]="!audio.currentTrack()"
                class="cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[#FFE6DB]"
                (click)="toggleHeart()"
            >
                <lucide-icon
                    [img]="heart"
                    [class]="audio.currentTrack() && playlistService.isLiked(audio.currentTrack()!.id) ? 'w-[1.25rem] h-[1.25rem] text-[#FF5500] fill-[#FF5500]' : 'w-[1.25rem] h-[1.25rem] text-[#FFE6DB]'"
                    [strokeWidth]="audio.currentTrack() && playlistService.isLiked(audio.currentTrack()!.id) ? 0 : 1.75"
                    [color]="audio.currentTrack() && playlistService.isLiked(audio.currentTrack()!.id) ? '#FF5500' : '#FFE6DB'"
                ></lucide-icon>
            </button>
            <button
                type="button"
                [attr.aria-label]="audio.repeatMode() === 'one' ? 'Repeat one' : audio.repeatMode() === 'all' ? 'Repeat all' : 'Repeat off'"
                [attr.aria-pressed]="audio.repeatMode() !== 'off'"
                [class]="audio.repeatMode() !== 'off' ? 'cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-[#FF5500] text-[#FFE6DB]' : 'cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[#FFE6DB]'"
                (click)="toggleRepeat()"
            >
                <lucide-icon
                    [img]="audio.repeatMode() === 'one' ? repeat1 : repeat"
                    class="w-[1.25rem] h-[1.25rem] text-[#FFE6DB]"
                ></lucide-icon>
            </button>
            <button
                type="button"
                aria-label="Shuffle"
                [attr.aria-pressed]="audio.shuffleEnabled()"
                [class]="audio.shuffleEnabled() ? 'cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-[#FF5500] text-[#FFE6DB]' : 'cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[#FFE6DB]'"
                (click)="toggleShuffle()"
            >
                <lucide-icon
                    [img]="shuffle"
                    class="w-[1.25rem] h-[1.25rem] text-[#FFE6DB]"
                ></lucide-icon>
            </button>
        </div>
    </div>
</div>
