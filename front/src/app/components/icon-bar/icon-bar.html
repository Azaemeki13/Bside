<div class="min-w-0 flex-none w-32">
    <div class="w-full h-[4rem] rounded-full border border-[#FFE6DB]/15 bg-[#FFE6DB]/10 px-3 py-2 backdrop-blur-sm glass-card">
        <div class="flex items-center justify-center gap-2 h-full">
            <button
                type="button"
                aria-label="Like"
                [attr.aria-pressed]="isHeartActive"
                class="cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[#FFE6DB]"
                (click)="toggleHeart()"
            >
                <lucide-icon
                    [img]="heart"
                    [class]="isHeartActive ? 'w-[1.25rem] h-[1.25rem] text-[#FF5500] fill-[#FF5500]' : 'w-[1.25rem] h-[1.25rem] text-[#FFE6DB]'"
                    [strokeWidth]="isHeartActive ? 0 : 1.75"
                    [color]="isHeartActive ? '#FF5500' : '#FFE6DB'"
                ></lucide-icon>
            </button>
            <button
                type="button"
                aria-label="Repeat"
                [attr.aria-pressed]="isRepeatOne"
                class="cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[#FFE6DB]"
                (click)="toggleRepeat()"
            >
                <lucide-icon
                    [img]="isRepeatOne ? repeat1 : repeat"
                    class="w-[1.25rem] h-[1.25rem] text-[#FFE6DB]"
                ></lucide-icon>
            </button>
            <button
                type="button"
                aria-label="Shuffle"
                [attr.aria-pressed]="isShuffleActive"
                [class]="isShuffleActive ? 'cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-[#FF5500] text-[#FFE6DB]' : 'cursor-pointer inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[#FFE6DB]'"
                (click)="toggleShuffle()"
            >
                <lucide-icon
                    [img]="shuffle"
                    class="w-[1.25rem] h-[1.25rem] text-[#FFE6DB]"
                ></lucide-icon>
            </button>
        </div>
    </div>
</div>
