<div class="flex flex-col gap-4">

    @if (authService.currentUser()?.role !== 'Artist') {
    <form class="rounded-[1.563rem] bg-[#1F0E1C] p-5 flex max-w-xl flex-col gap-3" (ngSubmit)="submitArtistRequest()">
        <p class="font-raleway font-bold text-[#FFE6DB]">Become an artist</p>
        <p class="font-raleway text-sm text-[#FFE6DB]/60">
        Send a request to the admin team. If accepted, your artist profile will be created.
        </p>

        <label class="flex flex-col gap-2 font-raleway text-sm text-[#FFE6DB]">
        Artist name
        <input class="rounded-md bg-[#FFE6DB] px-3 py-2 text-[#1F0E1C] outline-none" name="artistName" [(ngModel)]="artistName" required />
        </label>

        <label class="flex flex-col gap-2 font-raleway text-sm text-[#FFE6DB]">
        Bio
        <textarea class="min-h-28 rounded-md bg-[#FFE6DB] px-3 py-2 text-[#1F0E1C] outline-none" name="bio" [(ngModel)]="bio"></textarea>
        </label>

        <button class="rounded-md bg-[#FF5500] px-4 py-2 font-raleway font-bold text-[#FFE6DB] disabled:cursor-not-allowed disabled:opacity-50" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Sending...' : 'Send request' }}
        </button>

        @if (message) {
        <p class="font-raleway text-sm text-green-300">{{ message }}</p>
        }
        @if (error) {
        <p class="font-raleway text-sm text-red-300">{{ error }}</p>
        }
    </form>
    }

    @if (authService.currentUser()?.role === 'Admin') {
    <a routerLink="/bside_app/admin/artist-requests" class="max-w-xl rounded-md bg-[#FFE6DB] px-4 py-2 text-center font-raleway font-bold text-[#1F0E1C]">
        Review artist requests
    </a>
    }
</div>
