<div class="flex flex-row items-center gap-4 pb-6">
    <img 
    class="h-[10rem] w-[10rem] rounded-full object-cover" 
    [src]="avatarUrl()" 
    alt="Profile picture"
    referrerpolicy="no-referrer" 
    />
    <div class="flex flex-col">
        <span class="font-climate-crisis text-[2.5rem] text-[#FFE6DB] text-nowrap">{{ username() }} </span>
    </div>
</div>
<div>
    <p class="font-raleway font-bold text-[#FFE6DB] text-[1rem]">Public playlist(s)</p>
    <div class="grid grid-cols-7 gap-2 pt-2">
        @for (playlist of playlistService.playlists(); track playlist.id) {
            <button (click)="selectPlaylist(playlist)" class="rounded-[0.625rem] cursor-pointer min-w-0 w-full">
                <div class="w-full aspect-square rounded-[calc(0.625rem-2px)] overflow-hidden">
            @if (playlist.cover_url) {
              <img [src]="playlist.cover_url" alt="cover" class="w-full h-full object-cover" />
            } @else {
              <div class="w-full h-full bg-[#FFE6DB]/10 flex items-center justify-center backdrop-blur-sm glass-card">
                <span class="font-raleway font-bold text-[#FFE6DB] text-xs text-center px-2">{{ playlist.title }}</span>
              </div>
                }
            </div>
            <p class="font-raleway text-[1rem] text-[#FFE6DB] font-bold truncate text-left">{{ playlist.title }}</p>
            <p class="font-raleway text-[0.75rem] text-[#FFE6DB]/60 font-medium truncate text-left">By {{ playlist.owner_id === authService.currentUser()?.id ? 'you' : (playlist.owner_username ?? 'unknown') }} | {{ playlist.song_count }} tracks</p>            </button>
        }
    </div>
</div>
