<div class="flex flex-col gap-6">
  <div class="flex flex-nowrap gap-3 overflow-x-auto pb-4">
    @for (item of filteredAlbums(); track $index) {
      <div class="relative flex-shrink-0 w-40 h-40 rounded-2xl overflow-hidden
                  bg-white/5 border border-white/10 cursor-pointer
                  transition-transform duration-200 hover:border-[#FF5500]">
        <div class="absolute inset-0 -translate-x-full
                    bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
      </div>
    }
  </div>
</div>
