<div class="relative flex h-[22rem] w-[17.5rem] overflow-hidden rounded-[1.5rem]">
  <div
    class="absolute inset-0 bg-center bg-cover scale-110 blur-xl"
    [style.background-image]="'url(' + coverUrl(song.cover_url) + ')'"
  ></div>
  <div class="absolute inset-0 bg-[#1F0E1C]/20"></div>
  <div class="relative z-10 flex h-full w-full flex-col items-center justify-start p-[0.875rem]">
    <div class="h-[15.75rem] w-[15.75rem] overflow-hidden rounded-[1rem]">
      <img [src]="coverUrl(song.cover_url)" [alt]="song.title" class="h-full w-full object-cover" />
    </div>

    <div class="mt-3 flex w-full items-center justify-between gap-3">
      <div class="flex shrink-0 items-center gap-2">
        <button
          type="button"
          class="cursor-pointer flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-[#FF5500] hover:bg-[#FF7733] duration-200 shadow-lg"
          [attr.aria-label]="isPlaying() ? 'Pause song' : 'Play song'"
          (click)="togglePlay($event)"
        >
          @if (isPlaying()) {
            <lucide-icon [img]="pause" class="h-5 w-5 text-[#FFE6DB] fill-[#FFE6DB]"></lucide-icon>
          } @else {
            <lucide-icon [img]="play" class="h-5 w-5 text-[#FFE6DB] fill-[#FFE6DB]"></lucide-icon>
          }
        </button>

        <button
          type="button"
          class="flex h-8 w-8 items-center justify-center"
          [attr.aria-label]="isLiked() ? 'Unlike song' : 'Like song'"
          [attr.aria-pressed]="isLiked()"
          [disabled]="isLikePending"
          (click)="toggleLike($event)"
        >
          <lucide-icon
            [img]="heart"
            [class]="isLiked() ? 'h-[1.25rem] w-[1.25rem] text-[#FF5500] fill-[#FF5500] cursor-pointer' : 'h-[1.25rem] w-[1.25rem] text-[#FFE6DB] cursor-pointer'"
          ></lucide-icon>
        </button>
      </div>

      <div class="min-w-0 max-w-[11rem] flex-1 text-right">
        <p class="truncate font-raleway text-[1rem] font-bold text-[#FFE6DB]">{{ song.title }}</p>
        <p class="mt-1 truncate font-raleway text-[1rem] text-[#FFE6DB]">{{ song.artist_name }}</p>
      </div>
    </div>
  </div>
</div>
