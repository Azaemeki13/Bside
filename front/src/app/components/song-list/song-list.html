<div class="h-full bg-[#1F0E1C] rounded-[1.563rem] flex flex-col overflow-hidden">
  @if (playlistService.selectedPlaylist(); as playlist) {
    <div class="flex flex-1 min-h-0">
      <div class="flex flex-col flex-1 min-w-0 p-4">
        <div class="bg-[#1F0E1C]">
          <div class="grid grid-cols-3 space-between text-[#FFE6DB] font-raleway text-[1rem] font-medium pb-2 border-b border-[#FFE6DB]">
            <span>Title</span>
            <span>Album</span>
            <span>Date added</span>
            <span></span>
          </div>
        </div>
        <div class="flex-1 overflow-y-auto px-4 pb-4">
          <p class="font-raleway text-[#FFE6DB]/50 text-sm pt-4">No songs yet.</p>
        </div>
      </div>
      <div class="flex flex-col items-end gap-2 p-4 shrink-0">
        @if (playlist.isLiked) {
          <div class="w-[21rem] h-[21rem] rounded-[0.625rem] bg-gradient-to-br from-[#FF5500] to-[#B90E4D] flex items-center justify-center">
            <lucide-icon [img]="heart" class="w-[6.5rem] h-[6.5rem] text-[#FFE6DB] fill-[#FFE6DB]"></lucide-icon>
          </div>
        } @else if (playlist.cover) {
          <img [src]="playlist.cover" [alt]="playlist.name" class="w-[21rem] h-[21rem] rounded-[0.625rem] object-cover" />
        }
        <div class="w-[21rem]">
          <h2 class="font-climate-crisis text-[#FFE6DB] text-2xl truncate">{{ playlist.name }}</h2>
          @if (playlist.description) {
            <p class="font-raleway text-[#FFE6DB]/70 text-sm mt-1 truncate">{{ playlist.description }}</p>
          }
        </div>
      </div>

    </div>
  } @else {
    <div class="flex-1 flex items-center justify-center">
      <p class="font-raleway text-[#FFE6DB]/50 text-sm">Select a playlist to see its content.</p>
    </div>
  }
</div>
