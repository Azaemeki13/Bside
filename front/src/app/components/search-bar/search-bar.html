<div class="relative w-[25rem]">
  <div class="flex items-center gap-3 rounded-full border-2 border-[#FFE6DB] bg-transparent px-4 py-3">
    <lucide-icon [img]="search" class="h-5 w-5 text-[#FFE6DB]/70"></lucide-icon>
    <input
      type="text"
      placeholder="Search an artist, a song or an album"
      class="font-raleway flex-1 bg-transparent text-sm font-bold text-[#FFE6DB] placeholder:text-[#FFE6DB]/50 focus:outline-none"
      [value]="query"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="closeSoon()" />
  </div>

  @if (isOpen) {
    <div class="absolute left-0 right-0 top-[calc(100%+0.5rem)] z-50 max-h-96 overflow-y-auto rounded-lg bg-[#431E3A] py-2">
      @if (isSearching) {
        <p class="px-4 py-3 font-raleway text-sm text-[#FFE6DB]/60">Searching...</p>
      } @else if (error) {
        <p class="px-4 py-3 font-raleway text-sm text-red-300">{{ error }}</p>
      } @else if (results.length === 0) {
        <p class="px-4 py-3 font-raleway text-sm text-[#FFE6DB]/60">No results</p>
      } @else {
        @for (result of results; track result.type + result.data.id) {
          <button
            type="button"
            class="flex w-full appearance-none flex-col gap-1 border-0 bg-transparent px-4 py-3 text-left hover:bg-[#FFE6DB]/5 disabled:cursor-default disabled:opacity-60"
            [disabled]="!canOpen(result)"
            (pointerdown)="selectResult($event, result)">
            <span class="font-raleway text-sm font-bold text-[#FFE6DB]">{{ resultTitle(result) }}</span>
            <span class="font-raleway text-xs text-[#FFE6DB]/60">{{ resultMeta(result) }}</span>
          </button>
        }
      }
    </div>
  }
</div>
