<div class="w-full rounded-full border border-[#FFE6DB]/15 bg-[#FFE6DB]/10 pl-2 pr-6 py-2 backdrop-blur-sm glass-card">
  	<div class="grid w-full min-w-0 items-center gap-6" style="grid-template-columns: 13rem 8rem minmax(5rem, 1fr)">
  		<div class="flex min-w-0 items-center gap-3">
  			<button type="button" aria-label="Album cover" class="shrink-0 w-[3rem] h-[3rem] rounded-full overflow-hidden cursor-pointer">
  				@if (audio.currentTrack(); as track) {
  					<img [src]="track.coverUrl || 'assets/cover1.png'" alt="" class="w-full h-full object-cover" />
  				} @else {
  					<img src="assets/cover1.png" alt="" class="w-full h-full object-cover" />
  				}
  			</button>
  			<div class="flex min-w-0 flex-col justify-center">
  				@if (audio.currentTrack(); as track) {
  					<div #titleViewport class="min-w-0 overflow-hidden whitespace-nowrap">
              <span
                #titleText
                class="inline-block font-Raleway text-sm font-semibold text-[#FFE6DB] will-change-transform"
                [style.transform]="'translateX(-' + titleOffset() + 'px)'"
              >{{ track.title }}</span>
            </div>
  					<div #artistViewport class="min-w-0 overflow-hidden whitespace-nowrap">
              <span
                #artistText
                class="inline-block font-Raleway text-xs font-normal text-[#FFE6DB] will-change-transform"
                [style.transform]="'translateX(-' + artistOffset() + 'px)'"
              >{{ track.artist }}</span>
            </div>
  				} @else {
  					<p class="font-Raleway text-sm font-semibold text-[#FFE6DB] truncate">No track</p>
  				}
  			</div>
  		</div>
  		<div class="flex w-32 items-center justify-center gap-4">
  			<button type="button" aria-label="Track back" class="text-[#FFE6DB] cursor-pointer" (click)="previousTrack()">
  				<lucide-icon [img]="skipBackIcon" class="w-[1.25rem] h-[1.25rem]"></lucide-icon>
  			</button>
  			<button type="button" [attr.aria-label]="audio.isPlaying() ? 'Pause' : 'Play'" (click)="togglePlay()" class="text-[#FFE6DB] cursor-pointer rounded-full bg-[#FF5500] p-2">
  				<lucide-icon [img]="audio.isPlaying() ? pause : play" class="w-[1.75rem] h-[1.75rem] fill-current"></lucide-icon>
  			</button>
  			<button type="button" aria-label="Track next" class="text-[#FFE6DB] cursor-pointer" (click)="nextTrack()">
  				<lucide-icon [img]="skipForwardIcon" class="w-[1.25rem] h-[1.25rem]"></lucide-icon>
  			</button>
  		</div>
  		<div class="relative flex-1 flex items-center min-w-20 h-6 group">
  			<div class="absolute left-0 top-1/2 w-full -translate-y-1/2 h-[3px] rounded-full bg-[#FFE6DB]"></div>
  			<div
  				class="absolute left-0 top-1/2 -translate-y-1/2 h-1 rounded-full bg-[#FF5500] pointer-events-none"
  				[style.width.%]="audio.progressPercent()"
  			></div>
  			<input
  				type="range"
  				min="0" max="100" step="1"
  				[value]="audio.progressPercent()"
  				(input)="onInput($event)"
  				aria-label="Progress"
  				class="absolute w-full opacity-0 cursor-pointer h-6"
  			/>
  		</div>
  	</div>
  	@if (audio.error()) {
  		<p class="mt-2 px-4 text-xs text-[#FFE6DB]/80">{{ audio.error() }}</p>
  	}
</div>
