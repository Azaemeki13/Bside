<main class="bg-[#370F22] py-[3rem] sm:py-[3.5rem] md:py-[4rem]">
    <div class="flex flex-col items-center gap-[3rem] text-center">
        <h1 class="font-bold font-climate-crisis text-[#FFE6DB] text-[clamp(2rem,5vw,3rem)] text-[#FFE6DB]">MUSIC, DONE RIGHT.</h1>
        <div class="flex flex-wrap items-start justify-center gap-[1.5rem] sm:gap-[2.5rem] md:gap-[4rem]">
            <div class="flex flex-col items-center gap-[1rem] text-center">
                <app-cta-stack><lucide-icon [img]="circleDollarSign" class="h-[5rem] w-[5rem] text-[#FFE6DB]"></lucide-icon></app-cta-stack>
                <h3 class="max-w-[10ch] font-raleway text-[2.5rem] font-semibold text-[#FFE6DB]">Listen for free</h3>
            </div>
            <div class="flex flex-col items-center gap-[1rem] text-center">
                <app-cta-stack><lucide-icon [img]="messageCircle" class="h-[5rem] w-[5rem] text-[#FFE6DB]"></lucide-icon></app-cta-stack>
                <h3 class="max-w-[10ch] font-raleway text-[2.5rem] font-semibold text-[#FFE6DB]">Share with friends</h3>
            </div>
            <div class="flex flex-col items-center gap-[1rem] text-center">
                <app-cta-stack><lucide-icon [img]="badgeCheck" class="h-[5rem] w-[5rem] text-[#FFE6DB]"></lucide-icon></app-cta-stack>
                <h3 class="max-w-[10ch] font-raleway text-[2.5rem] font-semibold text-[#FFE6DB]">High-quality sound</h3>
            </div>
            <div class="flex flex-col items-center gap-[1rem] text-center">
                <app-cta-stack><lucide-icon [img]="puzzle" class="h-[5rem] w-[5rem] text-[#FFE6DB]"></lucide-icon></app-cta-stack>
                <h3 class="max-w-[10ch] font-raleway text-[2.5rem] font-semibold text-[#FFE6DB]">Made for you</h3>
            </div>
        </div>
    </div>
</main>
