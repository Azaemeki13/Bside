<footer class="bg-[#0C060C] text-white">
    <div class="mx-auto grid w-full max-w-7xl gap-10 px-4 py-8 sm:px-6 md:grid-cols-5 md:items-start md:px-8">
        <div class="flex flex-col items-start gap-3">
            <img class="h-[3rem] w-[11.125rem] object-contain" src="assets/B-SIDE.svg" alt="B-Side logo">
            <p class="text-sm text-white/70">© 2026 B-Side.</p>
        </div>

        <div class="flex flex-col items-start gap-2 text-left">
            <h3 class="text-[1.25rem] font-bold leading-none text-[#FFE6DB]">Legal</h3>
            <a href="#" class="text-[1rem] underline decoration-current underline-offset-4 text-[#FFE6DB]/60">Terms of Use</a>
            <a href="#" class="text-[1rem] underline decoration-current underline-offset-4 text-[#FFE6DB]/60">Privacy Policy</a>
            <a href="#" class="text-[1rem] underline decoration-current underline-offset-4 text-[#FFE6DB]/60">Legal Info</a>
        </div>

        <div class="flex flex-col items-start gap-2 text-left">
            <h3 class="text-[1.25rem] font-bold leading-none text-[#FFE6DB]">Support</h3>
            <a href="#" class="text-[1rem] underline decoration-current underline-offset-4 text-[#FFE6DB]/60">FAQ</a>
        </div>

        <div class="flex flex-col items-start gap-2 text-left">
            <h3 class="text-[1.25rem] font-bold leading-none text-[#FFE6DB]">About</h3>
            <a href="#" class="text-[1rem] underline decoration-current underline-offset-4 text-[#FFE6DB]/60">About us</a>
        </div>

        <details class="group flex flex-col items-start gap-2 text-left">
            <summary class="flex w-full cursor-pointer list-none items-center justify-between gap-3 text-left">
                <h3 class="text-[1.25rem] font-bold leading-none text-[#FFE6DB]">Let's stay connected</h3>
                <lucide-icon [img]="chevronDown" class="h-[2rem] w-[2rem] shrink-0 text-[#FFE6DB] transition-transform duration-200 group-open:rotate-90"></lucide-icon>
            </summary>

            <p class="text-[0.75rem] font-regular text-[#FFE6DB]/70">Reach out to us or give us a feedback !</p>

            <form class="mt-2 flex w-full max-w-[20rem] flex-col gap-3">
                <input type="email" placeholder="Email" class="w-full rounded-full bg-[#FFE6DB]/20 px-3 py-2 text-sm text-[#FFE6DB] placeholder:text-[#FFE6DB]/50 focus:outline-none focus:ring-2 focus:ring-[#FFE6DB]/40">
                <textarea rows="4" placeholder="Message" class="w-full rounded-md bg-[#FFE6DB]/20 px-3 py-2 text-sm text-[#FFE6DB] placeholder:text-[#FFE6DB]/50 focus:outline-none focus:ring-2 focus:ring-[#FFE6DB]/40"></textarea>
                <nav-button [label]="'Send'" [link]="'https://google.com'" variant="strawberry" fontSize="text-sm" fontStyle="font-medium"></nav-button>
            </form>
        </details>
    </div>
</footer>
