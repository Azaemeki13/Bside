<header class="bg-[#0C060C]">
  <div class="flex w-full flex-col items-center justify-between gap-4 px-4 py-4 sm:flex-row sm:px-6 md:px-8">
    <a routerLink="/" class="cursor-pointer">
      <img class="h-8 w-auto sm:h-10 md:h-12" src="assets/B-SIDE.svg" alt="B-Side logo">
    </a>
    <nav class="flex w-full justify-center gap-3 sm:w-auto sm:justify-end sm:gap-4 md:gap-6">
      <nav-button [label]="'Log in'" [link]="'/login'" variant="light-pink" fontSize="text-[clamp(0.875rem,2.2vw,1.5rem)]" fontStyle="font-medium"></nav-button>
      <nav-button [label]="'Sign up'" [link]="'/signup'" variant="raspberry" fontSize="text-[clamp(0.875rem,2.2vw,1.5rem)]" fontStyle="font-medium"></nav-button>
    </nav>
  </div>
</header>
