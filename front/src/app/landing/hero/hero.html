<main class="relative min-h-screen overflow-hidden bg-[#0c060c]">
    <img class="block h-full w-full object-cover rounded-[1.875rem]" src="assets/hero_img.png" alt="Hero Image">
    <div class="absolute inset-0 z-20 flex items-center justify-start p-8 text-left">
        <div class="flex max-w-[48rem] flex-col gap-3">
            <h1 class="text-[5rem] leading-none font-bold font-raleway text-[#FFE6DB] max-w-[6ch]">MUSIC FOR EVERY MOMENT.</h1>
            <h2 class="text-[2.5rem] leading-none font-normal font-raleway text-[#FFE6DB] max-w-[30ch]">Stream millions of songs, discover new artists, and build the soundtrack of your life.</h2>
            <nav-button [label]="'Get started'" [link]="'https://google.com'" variant="raspberry" fontSize="text-[1.5rem]" fontStyle="font-medium"></nav-button>        </div>
    </div>
</main>
